<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices Module</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
      <header>
            <nav class="navbar">
                <a href="index.html">Dashboard</a>
                <a href="clients.html">Client Management</a>
                <a href="invoices.html">Invoices</a>
            </nav>
        </header>
    <form id="invoiceForm">
        <input type="hidden" id="invoiceId">
        
        <div>
            <label for="clientSelect">Client:</label>
            <select id="clientSelect" required>
            </select>
        </div>
        <div>
            <label for="serviceTitle">Service Title:</label>
            <input type="text" id="serviceTitle" required>
        </div>
        <div>
            <label for="description">Description:</label>
            <textarea id="description" rows="3" required></textarea>
        </div>
        <div>
            <label for="amount">Amount ($):</label>
            <input type="number" id="amount" step="0.01" required>
        </div>
        <div>
            <label for="invoiceDate">Date:</label>
            <input type="date" id="invoiceDate" required>
        </div>
        <button type="submit" id="submitBtn">Create Invoice</button>
        <button type="button" id="cancelBtn" style="display:none;">Cancel Edit</button>
    </form>

    <div class="summary">
        <div>Total Invoiced: $<span id="totalInvoiced">0.00</span></div>
        <div>Total Paid: $<span id="totalPaid">0.00</span></div>
        <div>Total Unpaid: $<span id="totalUnpaid">0.00</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Client</th>
                <th>Service Title</th>
                <th>Description</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="invoiceTableBody">
        </tbody>
    </table>

    <script src="data.js"></script>
    <script src="utils.js"></script>
    <script src="invoices.js"></script>
</body>
</html>
